<link rel="stylesheet" href="https://at.alicdn.com/t/c/font_3243552_i44qqvm0p8e.css" />
<div class="flex h-screen flex-col overflow-hidden bg-bg-primary text-text-primary sm:flex-row">
  <!-- PC端：Header + Search + TabBar 位于第一列 -->
  <div class="hidden border-r p-4 sm:flex sm:w-64 sm:flex-col">
    <div class="flex items-center gap-2">
      <img src="https://lf-flow-web-cdn.doubao.com/obj/flow-doubao/doubao/web/doubao_avatar.png" class="h-8 w-8" />
      <h1 class="text-xl font-bold">Nodim</h1>
    </div>
    <!-- 搜索框 -->
    <div class="relative mt-4 w-full">
      <i class="iconfont icon-sousuo absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-text-primary-second"> </i>
      <!-- 搜索输入框（左侧留空，文字垂直居中） -->
      <input class="focus:ring-primary/30 w-full rounded-full border border-brand-300 bg-bg-primary py-2 pl-10 pr-4 focus:border-primary focus:outline-none focus:ring-2" placeholder="搜索" type="text" />
    </div>
    <!-- 导航栏（对应移动端底部导航） -->
    <div class="mt-6 flex flex-col gap-4">
      <button>消息</button>
      <button>联系人</button>
      <button>我的</button>
    </div>
  </div>
  <!-- 移动端 Header -->
  <header class="pt-safe flex flex-col gap-2 p-4 sm:hidden">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <img src="https://lf-flow-web-cdn.doubao.com/obj/flow-doubao/doubao/web/doubao_avatar.png" class="h-8 w-8" />
        <h1 class="text-xl font-bold">Nodim</h1>
      </div>
      <!-- <img src="https://lf-flow-web-cdn.doubao.com/obj/flow-doubao/doubao/web/doubao_avatar.png" alt="扫描" class="h-6 w-6" /> -->
      <i class="iconfont icon-a-wodePeerIDerweima h-6 w-6 text-primary"> </i>
    </div>
    <!-- 搜索框：我帮你改成了【带左侧图标的居中结构】 -->
    <div class="relative w-full">
      <i class="iconfont icon-sousuo absolute left-4 top-1/2 h-5 w-5 -translate-y-1/2 text-text-primary-second"></i>
      <input class="focus:ring-primary/30 w-full rounded-full border border-brand-300 bg-primary-second py-2 pl-10 pr-4 focus:border-primary focus:outline-none focus:ring-2" placeholder="搜索" type="text" />
    </div>
  </header>
  <!-- 第二列：会话列表（移动端、PC共用） -->
  <div class="scrollbar-hide flex-1 overflow-y-auto border-r sm:max-w-xs">
    <ul class="divide-y p-2">
      <li class="flex items-center gap-3 p-3">
        <img class="h-10 w-10 rounded-full" src="https://lf-flow-web-cdn.doubao.com/obj/flow-doubao/doubao/web/doubao_avatar.png" />
        <div class="overflow-hidden">
          <p class="font-medium">name</p>
          <p class="truncate text-sm text-text-primary-second">person@email.com</p>
        </div>
      </li>
    </ul>
  </div>
  <!-- PC端：内容显示区 -->
  <div class="hidden flex-1 items-center justify-center sm:flex">内容区域</div>
  <!-- 移动端：底部导航 -->
  <nav class="fixed bottom-4 left-1/2 flex w-[70vw] -translate-x-1/2 items-center rounded-full border-2 border-primary bg-bg-primary p-0.5 shadow-lg sm:hidden">
    <button class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full bg-primary text-white transition-all"><i class="iconfont icon-xiaoxi !text-md !text-md font-[1000]"> </i><span class="text- text-xs font-medium">消息</span></button>
    <button class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-primary transition-all">
      <i class="iconfont icon-lianxiren !text-md !text-md font-[1000]"></i>
      <span class="text-xs font-medium">联系人</span>
    </button>
    <button class="flex flex-1 flex-col items-center justify-center gap-0.5 rounded-full text-primary transition-all">
      <i class="iconfont icon-wode !text-md !text-md font-[1000]"></i>
      <span class="text-xs font-medium">测试</span>
    </button>
